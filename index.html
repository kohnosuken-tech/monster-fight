<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モンスターファイト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #gameContainer { position: relative; width: 900px; }
  canvas {
    display: block;
    border: 3px solid #ff4400;
    box-shadow: 0 0 40px #ff440066, 0 0 80px #ff220033;
    image-rendering: pixelated;
  }
  #controls {
    color: #556;
    font-size: 11px;
    text-align: center;
    margin-top: 8px;
    line-height: 1.8;
  }
  #controls span { color: #889; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas" width="900" height="500"></canvas>
</div>
<div id="controls" id="controlsDiv">
  <span>移動: A/D ｜ ジャンプ: W ｜ ガード: S ｜ 攻撃: F ｜ 必殺技: G ｜ 超必殺(カメハメビーム): S+G</span>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;

// ===== キャラクター定義 =====
const MONSTERS = [
  {
    id: 0, name: 'ドラコン', nameEn: 'DRAKON', desc: '炎の竜神',
    color: '#ff4400', color2: '#ff8800', glowColor: '#ff4400',
    hp: 180, speed: 4.5, jumpPower: 10, attackDmg: 18, specialDmg: 45,
    specialName: '竜炎爆発',
    draw(ctx, x, y, dir, state, frame) {
      const f = Math.floor(frame / 8) % 2;
      const breathe = Math.sin(frame * 0.05) * 2;
      const walkL = state==='walk' ? Math.sin(frame*0.3)*10 : 0;
      const armOff = state==='attack' ? 28 : 0;
      const hurtTilt = state==='hurt' ? 0.25 : 0;

      ctx.save(); ctx.translate(x, y);
      if (dir < 0) ctx.scale(-1, 1);
      if (hurtTilt) ctx.rotate(-hurtTilt);

      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0, 2, 28, 7, 0, 0, Math.PI*2); ctx.fill();

      // Wings behind body
      ctx.save();
      const wingFlap = Math.sin(frame * 0.15) * 8;
      for (let s of [-1,1]) {
        ctx.save(); ctx.scale(s,1);
        const wg = ctx.createLinearGradient(10,-80,55,-20);
        wg.addColorStop(0,'rgba(180,20,0,0.7)');
        wg.addColorStop(0.5,'rgba(120,10,0,0.5)');
        wg.addColorStop(1,'rgba(60,0,0,0.2)');
        ctx.fillStyle = wg;
        ctx.beginPath();
        ctx.moveTo(12,-50);
        ctx.bezierCurveTo(35,-90+wingFlap,65,-80+wingFlap*0.5,55,-30);
        ctx.bezierCurveTo(45,-20,25,-25,12,-50);
        ctx.closePath(); ctx.fill();
        // Wing membrane lines
        ctx.strokeStyle='rgba(80,0,0,0.5)'; ctx.lineWidth=1;
        for (let i=1;i<=3;i++) {
          ctx.beginPath();
          ctx.moveTo(12,-50);
          ctx.lineTo(12+i*14,-90+wingFlap+i*15); ctx.stroke();
        }
        ctx.restore();
      }
      ctx.restore();

      // Tail
      ctx.save();
      const tailWag = state==='walk' ? Math.sin(frame*0.25)*15 : Math.sin(frame*0.08)*5;
      const tg = ctx.createLinearGradient(-20,-30,-60,30);
      tg.addColorStop(0,'#cc3300'); tg.addColorStop(1,'#881100');
      ctx.strokeStyle = tg; ctx.lineWidth = 12; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-18,-28);
      ctx.bezierCurveTo(-55,-10+tailWag,-70,15+tailWag,-55,35);
      ctx.stroke();
      ctx.lineWidth=6;
      ctx.beginPath();
      ctx.moveTo(-55,35);
      ctx.lineTo(-65,25); ctx.lineTo(-58,38); ctx.stroke();
      ctx.restore();

      // Legs
      for (let s of [-1,1]) {
        const lo = s * walkL;
        const lg = ctx.createLinearGradient(s*8,-10,s*20,28);
        lg.addColorStop(0,'#cc3300'); lg.addColorStop(1,'#881100');
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.roundRect(s*8,-8+lo,14,30,5); ctx.fill();
        ctx.strokeStyle='#661100'; ctx.lineWidth=1;
        ctx.strokeRect(s*8,-8+lo,14,30);
        // Claws
        ctx.fillStyle='#ffeecc';
        for (let c=-1;c<=1;c++) {
          ctx.beginPath();
          ctx.moveTo(s*8+7+c*4, 22+lo);
          ctx.lineTo(s*8+5+c*5, 32+lo+Math.abs(c)*2);
          ctx.lineTo(s*8+9+c*4, 22+lo);
          ctx.closePath(); ctx.fill();
        }
      }

      // Body - muscular torso
      const bodyG = ctx.createRadialGradient(-8,-42,4,0,-35,32);
      bodyG.addColorStop(0,'#ff8844');
      bodyG.addColorStop(0.4,'#ff4400');
      bodyG.addColorStop(0.8,'#cc2200');
      bodyG.addColorStop(1,'#881100');
      ctx.fillStyle = bodyG;
      ctx.beginPath(); ctx.ellipse(0,-35+breathe*0.5,28,38,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#661100'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(0,-35+breathe*0.5,28,38,0,0,Math.PI*2); ctx.stroke();

      // Belly/chest scale shading
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(8,-30,14,20,0.2,0,Math.PI*2); ctx.fill();

      // Scale pattern on body
      ctx.strokeStyle='rgba(80,0,0,0.3)'; ctx.lineWidth=1;
      for (let row=0;row<4;row++) {
        for (let col=-1;col<=1;col++) {
          const sx=col*14+(row%2)*7, sy=-60+row*14;
          ctx.beginPath(); ctx.arc(sx,sy+breathe*0.3,6,Math.PI,0); ctx.stroke();
        }
      }

      // Belly lighter patch
      const bellyG = ctx.createRadialGradient(-5,-32,2,0,-28,18);
      bellyG.addColorStop(0,'#ffaa66');
      bellyG.addColorStop(1,'rgba(255,100,50,0)');
      ctx.fillStyle=bellyG;
      ctx.beginPath(); ctx.ellipse(0,-30,16,22,0,0,Math.PI*2); ctx.fill();

      // Body specular highlight
      ctx.fillStyle='rgba(255,200,150,0.25)';
      ctx.beginPath(); ctx.ellipse(-8,-50,8,14,0.3,0,Math.PI*2); ctx.fill();

      // Arms
      for (let s of [-1,1]) {
        const ax = s>0 ? armOff : 0;
        const ag = ctx.createLinearGradient(s*18+ax,-48,s*30+ax,-15);
        ag.addColorStop(0,'#ff5511'); ag.addColorStop(1,'#aa2200');
        ctx.fillStyle=ag;
        ctx.beginPath(); ctx.roundRect(s>0?(18+ax):(-30),-48,13,34,5); ctx.fill();
        ctx.strokeStyle='#661100'; ctx.lineWidth=1;
        ctx.strokeRect(s>0?(18+ax):(-30),-48,13,34);
        // Claws on hands
        const handX = s>0?(24+ax):(-24);
        ctx.fillStyle='#ffeecc';
        for (let c=-1;c<=1;c++) {
          ctx.beginPath();
          ctx.moveTo(handX+c*4,-14);
          ctx.lineTo(handX+c*5,-8+Math.abs(c)*2);
          ctx.lineTo(handX+c*4+3,-14);
          ctx.closePath(); ctx.fill();
        }
      }

      // Neck
      const neckG = ctx.createLinearGradient(-8,-70,8,-58);
      neckG.addColorStop(0,'#ff5511'); neckG.addColorStop(1,'#cc2200');
      ctx.fillStyle=neckG;
      ctx.beginPath(); ctx.roundRect(-9,-72,18,16,4); ctx.fill();

      // Head - elongated dragon snout
      const headG = ctx.createRadialGradient(-6,-78,4,0,-75,25);
      headG.addColorStop(0,'#ff6633');
      headG.addColorStop(0.5,'#ee3300');
      headG.addColorStop(1,'#991100');
      ctx.fillStyle=headG;
      ctx.beginPath(); ctx.ellipse(0,-77,23,19,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#661100'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(0,-77,23,19,0,0,Math.PI*2); ctx.stroke();

      // Snout
      const snoutG = ctx.createRadialGradient(8,-73,2,10,-72,12);
      snoutG.addColorStop(0,'#ff7744'); snoutG.addColorStop(1,'#cc2200');
      ctx.fillStyle=snoutG;
      ctx.beginPath(); ctx.ellipse(10,-73,12,8,0.2,0,Math.PI*2); ctx.fill();
      // Nostrils
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.ellipse(6,-70,2,1.5,0.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(13,-70,2,1.5,0.3,0,Math.PI*2); ctx.fill();

      // Horns
      for (let i of [-1,1]) {
        const hornG = ctx.createLinearGradient(i*8,-85,i*14,-110);
        hornG.addColorStop(0,'#ddaa00'); hornG.addColorStop(1,'#ffee44');
        ctx.fillStyle=hornG;
        ctx.beginPath(); ctx.moveTo(i*6,-82); ctx.lineTo(i*16,-112-f*3); ctx.lineTo(i*3,-89); ctx.closePath(); ctx.fill();
        ctx.strokeStyle='#aa8800'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(i*6,-82); ctx.lineTo(i*16,-112-f*3); ctx.lineTo(i*3,-89); ctx.closePath(); ctx.stroke();
        // Horn highlight
        ctx.fillStyle='rgba(255,240,150,0.5)';
        ctx.beginPath(); ctx.moveTo(i*7,-84); ctx.lineTo(i*11,-100); ctx.lineTo(i*5,-88); ctx.closePath(); ctx.fill();
      }

      // Eyes - glowing slit pupils
      for (let ex of [-8,8]) {
        // Eye white/iris glow
        const eyeG = ctx.createRadialGradient(ex-1,-78,0,ex,-78,6);
        eyeG.addColorStop(0,'#ffff88');
        eyeG.addColorStop(0.5,'#ffcc00');
        eyeG.addColorStop(1,'#cc8800');
        ctx.fillStyle=eyeG;
        ctx.beginPath(); ctx.arc(ex,-78,6,0,Math.PI*2); ctx.fill();
        // Slit pupil
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.ellipse(ex,-78,1.5,5,0,0,Math.PI*2); ctx.fill();
        // Specular
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(ex-2,-80,1.5,0,Math.PI*2); ctx.fill();
      }

      // Teeth
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.moveTo(4,-65); ctx.lineTo(2,-57); ctx.lineTo(6,-65); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(9,-64); ctx.lineTo(7,-56); ctx.lineTo(11,-64); ctx.closePath(); ctx.fill();

      // Head specular highlight
      ctx.fillStyle='rgba(255,180,130,0.3)';
      ctx.beginPath(); ctx.ellipse(-8,-86,7,9,0.4,0,Math.PI*2); ctx.fill();

      ctx.restore();
    },
    drawSpecial(ctx, x, y, dir, progress) {
      for (let i=0;i<8;i++) {
        const t=(progress+i/8)%1, px=x+dir*t*400, py=y-40+Math.sin(t*Math.PI*4)*20, r=(1-t)*35;
        const g=ctx.createRadialGradient(px,py,0,px,py,r);
        g.addColorStop(0,'#ffffff'); g.addColorStop(0.3,'#ffaa00'); g.addColorStop(1,'#ff440000');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
      }
    }
  },
  {
    id: 1, name: 'スライモア', nameEn: 'SLIMOR', desc: '毒液の巨体',
    color: '#44ff44', color2: '#88ff88', glowColor: '#00ff44',
    hp: 220, speed: 3, jumpPower: 8, attackDmg: 14, specialDmg: 55,
    specialName: '毒液大爆発',
    draw(ctx, x, y, dir, state, frame) {
      const bounce = Math.abs(Math.sin(frame*0.12))*5;
      const wobble = Math.sin(frame*0.18)*6;
      const wobble2 = Math.cos(frame*0.22)*5;
      const atkOff = state==='attack' ? 32 : 0;
      const hurtAlpha = state==='hurt' ? 0.5 : 1;

      ctx.save(); ctx.translate(x, y - bounce);
      if (dir<0) ctx.scale(-1,1);
      ctx.globalAlpha = hurtAlpha;

      // Drop shadow
      ctx.globalAlpha=0.25;
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(0, 2+bounce, 34, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;

      // Slime drips at bottom
      for (let i=-2;i<=2;i++) {
        const dlen = 8 + Math.abs(Math.sin(frame*0.1+i*1.3))*18;
        const dg = ctx.createLinearGradient(i*14,8,i*14,8+dlen);
        dg.addColorStop(0,'rgba(30,200,30,0.8)'); dg.addColorStop(1,'rgba(20,180,20,0)');
        ctx.fillStyle=dg;
        ctx.beginPath(); ctx.ellipse(i*14, 8+dlen*0.4, 4-Math.abs(i)*0.3, dlen*0.6, 0, 0, Math.PI*2); ctx.fill();
      }

      // Outer dark blob (shadow layer)
      ctx.fillStyle='rgba(0,80,0,0.5)';
      ctx.beginPath();
      ctx.moveTo(0,-92);
      ctx.bezierCurveTo(-44+wobble,-92,-50,-42,-44,2);
      ctx.bezierCurveTo(-40,18,40,18,44,2);
      ctx.bezierCurveTo(50,-42,44-wobble,-92,0,-92);
      ctx.fill();

      // Middle blob layer
      const midG = ctx.createRadialGradient(-12,-55,5,0,-45,46);
      midG.addColorStop(0,'#88ff88');
      midG.addColorStop(0.35,'#44ff44');
      midG.addColorStop(0.7,'#22cc22');
      midG.addColorStop(1,'#116611');
      ctx.fillStyle=midG;
      ctx.beginPath();
      ctx.moveTo(0,-88);
      ctx.bezierCurveTo(-40+wobble,-88,-46,-40,-40,0);
      ctx.bezierCurveTo(-38,14,38,14,40,0);
      ctx.bezierCurveTo(46,-40,40-wobble,-88,0,-88);
      ctx.fill();

      // Inner glow layer
      const innerG = ctx.createRadialGradient(-10,-60,3,0,-50,28);
      innerG.addColorStop(0,'rgba(200,255,200,0.6)');
      innerG.addColorStop(0.5,'rgba(100,255,100,0.2)');
      innerG.addColorStop(1,'rgba(50,200,50,0)');
      ctx.fillStyle=innerG;
      ctx.beginPath();
      ctx.moveTo(0,-88);
      ctx.bezierCurveTo(-40+wobble,-88,-46,-40,-40,0);
      ctx.bezierCurveTo(-38,14,38,14,40,0);
      ctx.bezierCurveTo(46,-40,40-wobble,-88,0,-88);
      ctx.fill();

      // Top glossy highlight
      ctx.fillStyle='rgba(200,255,200,0.55)';
      ctx.beginPath(); ctx.ellipse(-8,-78,16,10,0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.ellipse(-10,-80,8,5,0.3,0,Math.PI*2); ctx.fill();

      // Bubbles inside body
      for (let i=0;i<5;i++) {
        const bx = Math.sin(frame*0.09+i*1.4)*18;
        const by = -20 - ((frame*0.4+i*18)%55);
        const br = 3+i*0.7;
        ctx.strokeStyle='rgba(150,255,150,0.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(200,255,200,0.15)';
        ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
      }

      // Tentacle arms
      ctx.lineCap='round'; ctx.lineJoin='round';
      for (let s of [-1,1]) {
        const off = s>0 ? atkOff : 0;
        const tg = ctx.createLinearGradient(s*36,-55,s*(52+off),0);
        tg.addColorStop(0,'#33dd33'); tg.addColorStop(1,'#116611');
        ctx.strokeStyle=tg; ctx.lineWidth=12;
        ctx.beginPath(); ctx.moveTo(s*34,-52);
        ctx.bezierCurveTo(s*(58+off),-38+Math.sin(frame*0.2+s)*12,s*(48+off),-18,s*(42+off*0.8),2);
        ctx.stroke();
        ctx.lineWidth=7;
        ctx.strokeStyle='rgba(100,255,100,0.4)';
        ctx.beginPath(); ctx.moveTo(s*34,-52);
        ctx.bezierCurveTo(s*(58+off),-38+Math.sin(frame*0.2+s)*12,s*(48+off),-18,s*(42+off*0.8),2);
        ctx.stroke();
        // Sucker at tip
        ctx.fillStyle='rgba(0,80,0,0.7)';
        ctx.beginPath(); ctx.arc(s*(42+off*0.8),2,5,0,Math.PI*2); ctx.fill();
      }

      // 3 Eyes visible through translucent body
      for (let [ex,ey,er] of [[-14,-64,8],[14,-64,8],[0,-50,7]]) {
        // Eye glow behind
        const eyeBackG = ctx.createRadialGradient(ex,ey,0,ex,ey,er+4);
        eyeBackG.addColorStop(0,'rgba(255,255,0,0.3)');
        eyeBackG.addColorStop(1,'rgba(255,255,0,0)');
        ctx.fillStyle=eyeBackG;
        ctx.beginPath(); ctx.arc(ex,ey,er+4,0,Math.PI*2); ctx.fill();
        // Yellow iris
        const eyeG = ctx.createRadialGradient(ex-2,ey-2,0,ex,ey,er);
        eyeG.addColorStop(0,'#ffff88'); eyeG.addColorStop(0.5,'#ffcc00'); eyeG.addColorStop(1,'#aa8800');
        ctx.fillStyle=eyeG;
        ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
        // Pupil
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.arc(ex+1,ey,er*0.48,0,Math.PI*2); ctx.fill();
        // Specular
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.beginPath(); ctx.arc(ex-2,ey-2,er*0.22,0,Math.PI*2); ctx.fill();
      }

      // Mouth smile
      ctx.strokeStyle='rgba(0,80,0,0.8)'; ctx.lineWidth=3;
      ctx.beginPath();
      if (state==='attack') {
        ctx.arc(0,-38,14,0.2,Math.PI-0.2); ctx.stroke();
      } else {
        ctx.arc(0,-38,12,-Math.PI+0.4,-0.4); ctx.stroke();
      }

      ctx.restore();
    },
    drawSpecial(ctx, x, y, dir, progress) {
      for (let i=0;i<12;i++) {
        const ang=(i/12)*Math.PI*2+progress*Math.PI*3, dist=progress*300;
        const px=x+Math.cos(ang)*dist, py=y-40+Math.sin(ang)*dist*0.5, r=(1-progress)*25;
        const g=ctx.createRadialGradient(px,py,0,px,py,r);
        g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,'#44ff44'); g.addColorStop(1,'#44ff4400');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
      }
    }
  },
  {
    id: 2, name: 'サンダーウルフ', nameEn: 'THUNDERWOLF', desc: '雷撃の狼王',
    color: '#4488ff', color2: '#aaddff', glowColor: '#88aaff',
    hp: 170, speed: 6, jumpPower: 11, attackDmg: 16, specialDmg: 40,
    specialName: '雷閃崩撃',
    draw(ctx, x, y, dir, state, frame) {
      const breathe = Math.sin(frame*0.05)*2;
      const walkL = state==='walk' ? Math.sin(frame*0.35)*11 : 0;
      const ao = state==='attack' ? 26 : 0;

      ctx.save(); ctx.translate(x,y);
      if (dir<0) ctx.scale(-1,1);

      // Drop shadow
      ctx.fillStyle='rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0,2,28,7,0,0,Math.PI*2); ctx.fill();

      // Electric aura crackling
      if (state!=='hurt') {
        ctx.save();
        ctx.strokeStyle='rgba(180,220,255,0.6)'; ctx.lineWidth=1.5;
        for (let i=0;i<6;i++) {
          const ang = (i/6)*Math.PI*2 + frame*0.08;
          const r1=40, r2=50+Math.sin(frame*0.4+i)*8;
          const sx=Math.cos(ang)*r1, sy=-45+Math.sin(ang)*r1*0.6;
          const ex=Math.cos(ang)*r2, ey=-45+Math.sin(ang)*r2*0.6;
          ctx.beginPath(); ctx.moveTo(sx,sy);
          ctx.lineTo((sx+ex)/2+(Math.random()-0.5)*8,(sy+ey)/2+(Math.random()-0.5)*8);
          ctx.lineTo(ex,ey); ctx.stroke();
        }
        ctx.restore();
      }

      // Tail - lightning bolt shape
      const tailWag = Math.sin(frame*0.28)*18;
      const tg = ctx.createLinearGradient(-20,-32,-65,15);
      tg.addColorStop(0,'#5599ff'); tg.addColorStop(1,'#2244aa');
      ctx.strokeStyle=tg; ctx.lineWidth=10; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(-22,-32);
      ctx.bezierCurveTo(-58,-18+tailWag,-72,-2+tailWag,-60,14);
      ctx.stroke();
      // Lightning tip on tail
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.moveTo(-60,14); ctx.lineTo(-70,6); ctx.lineTo(-63,18); ctx.lineTo(-72,12); ctx.lineTo(-60,25); ctx.fill();

      // Legs
      for (let s of [-1,1]) {
        const lo = s*walkL;
        const lg = ctx.createLinearGradient(s*8,-12,s*20,26);
        lg.addColorStop(0,'#3366cc'); lg.addColorStop(1,'#1a3388');
        ctx.fillStyle=lg;
        ctx.beginPath(); ctx.roundRect(s>0?6:-20,-10+lo,14,32,5); ctx.fill();
        ctx.strokeStyle='rgba(100,150,255,0.4)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(s>0?6:-20,-10+lo,14,32,5); ctx.stroke();
        // Paws with claws
        ctx.fillStyle='#2255aa';
        ctx.beginPath(); ctx.ellipse(s>0?13:-13,22+lo,8,5,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#ccddff'; ctx.lineWidth=1;
        for (let c=-1;c<=1;c++) {
          ctx.beginPath(); ctx.moveTo((s>0?13:-13)+c*4,22+lo); ctx.lineTo((s>0?13:-13)+c*4,28+lo); ctx.stroke();
        }
      }

      // Body - muscular torso with fur gradient
      const bodyG = ctx.createRadialGradient(-10,-38,5,0,-32,34);
      bodyG.addColorStop(0,'#88aaff');
      bodyG.addColorStop(0.35,'#5588ee');
      bodyG.addColorStop(0.7,'#3366cc');
      bodyG.addColorStop(1,'#112266');

// ===== パーティクル =====
const particles = [];
function addParticles(x,y,color,count,type='hit') {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, spd=type==='hit'?Math.random()*6+2:Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,color,life:1,size:type==='hit'?Math.random()*8+3:Math.random()*5+2});
  }
}
function updateParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life-=0.04;
    if (p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

  for (let i=specialTexts.length-1;i>=0;i--) {
    const t=specialTexts[i]; t.life-=0.015; t.y-=0.5;
    if (t.life<=0){specialTexts.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=Math.min(1,t.life*2);
    ctx.font=`bold ${36+(1-t.life)*10}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.shadowColor=t.color; ctx.shadowBlur=20;
    ctx.strokeText(t.name,W/2,t.y);
    ctx.fillStyle='#fff'; ctx.fillText(t.name,W/2,t.y);
    ctx.restore();
  }
}

// ===== CPU AI =====
class CPU {
  constructor() {
    this.thinkTimer = 0;
    this.action = 'approach';
    this.fakeKeys = {};
    this._atkToggle = false;
    this._spcToggle = false;
    this._jmpToggle = false;
    this.atkCooldown = 0;
  }
  update(me, opponent) {
    const dx = opponent.x - me.x;
    const dist = Math.abs(dx);
    this.thinkTimer--;
    if (this.atkCooldown > 0) this.atkCooldown--;

    if (this.thinkTimer <= 0) {
      this.thinkTimer = 15 + Math.floor(Math.random()*25);
      const hpRatio = me.hp / me.maxHp;
      const r = Math.random();
      if (dist < 95) {
        if (r < 0.50) this.action = 'attack';
        else if (r < 0.65) this.action = 'guard';
        else if (r < 0.75) this.action = 'jump';
        else if (me.specialCooldown === 0 && r < 0.90) this.action = 'special';
        else this.action = 'retreat';
      } else if (dist < 250) {
        if (r < 0.65) this.action = 'approach';
        else if (r < 0.80) this.action = 'attack';
        else if (r < 0.90) this.action = 'jump';
        else this.action = 'guard';
      } else {
        this.action = r < 0.85 ? 'approach' : 'jump';
      }
      // ピンチ時に必殺技を使いやすくする
      if (hpRatio < 0.3 && me.specialCooldown === 0 && Math.random() < 0.4) {
        this.action = 'special';
      }
    }

    const fk = {};
    switch (this.action) {
      case 'approach':
        fk[dx>0?'ArrowRight':'ArrowLeft'] = true; break;
      case 'retreat':
        fk[dx>0?'ArrowLeft':'ArrowRight'] = true; break;
      case 'attack':
        if (dist < 105 && this.atkCooldown === 0) {
          fk['k'] = !this._atkToggle;
          this._atkToggle = !this._atkToggle;
          if (!this._atkToggle) this.atkCooldown = 18;
        } else if (dist >= 105) {
          fk[dx>0?'ArrowRight':'ArrowLeft'] = true;
        }
        break;
      case 'guard':
        fk['ArrowDown'] = true; break;
      case 'jump':
        fk['ArrowUp'] = !this._jmpToggle;
        this._jmpToggle = !this._jmpToggle; break;
      case 'special':
        if (dist < 420) {
          fk['l'] = !this._spcToggle;
          this._spcToggle = !this._spcToggle;
        } else {
          fk[dx>0?'ArrowRight':'ArrowLeft'] = true;
        }
        break;
    }
    this.fakeKeys = fk;
    return fk;
  }
}

// ===== ファイタークラス =====
class Fighter {
  constructor(monsterIdx, x, dir, playerNum) {
    this.monster = MONSTERS[monsterIdx];
    this.x = x; this.y = H-80;
    this.vx = 0; this.vy = 0;
    this.dir = dir;
    this.hp = this.monster.hp; this.maxHp = this.monster.hp;
    this.state = 'idle'; this.frame = 0;
    this.attackTimer = 0; this.guardTimer = 0;
    this.hurtTimer = 0; this.specialCooldown = 0;
    this.onGround = true; this.playerNum = playerNum;
    this.hitFlash = 0;
    this.specialActive = false; this.specialProgress = 0;
    this.wins = 0;
    this.comboCount = 0; this.comboTimer = 0;
    this._prevAtk = false; this._prevSpc = false; this._prevJump = false; this._prevSuper = false;
    this.superCooldown = 0;
    this.superBeamActive = false; this.superBeamProgress = 0;
  }
  get groundY() { return H-80; }

  update(keys, other) {
    this.frame++;
    if (this.hitFlash>0) this.hitFlash--;
    if (this.attackTimer>0) this.attackTimer--;
    if (this.guardTimer>0) this.guardTimer--;
    if (this.hurtTimer>0) this.hurtTimer--;
    if (this.specialCooldown>0) this.specialCooldown--;
    if (this.superCooldown>0) this.superCooldown--;
    if (this.comboTimer>0) this.comboTimer--; else this.comboCount=0;

    if (this.specialActive) {
      this.specialProgress+=0.03;
      if (this.specialProgress>=1){this.specialActive=false;this.specialProgress=0;this.state='idle';}
    }
    if (this.superBeamActive) {
      this.superBeamProgress+=0.018;
      if (this.superBeamProgress>=1){this.superBeamActive=false;this.superBeamProgress=0;this.state='idle';}
    }
    const inHurt = this.hurtTimer>0;
    const inSpecial = this.specialActive || this.superBeamActive;
    if (inHurt) this.state='hurt';
    if (inSpecial) this.state='special';

    if (other.x>this.x) this.dir=1; else this.dir=-1;

    const guardKey = keys['s']||keys['ArrowDown'];
    if (!inHurt && !inSpecial && guardKey && this.onGround && this.attackTimer===0) {
      this.state='guard'; this.guardTimer=2; this.vx*=0.7;
    }

    if (!inHurt && !inSpecial && this.attackTimer===0) {
      const atkKey = keys['f']||keys['k'];
      const spcKey = keys['g']||keys['l'];
      if (atkKey && !this._prevAtk) {
        this.attackTimer=20; this.state='attack';
        const dx=other.x-this.x;
        if (Math.abs(dx)<160 && Math.sign(dx)===this.dir) {
          if (other.guardTimer>0) {
            addParticles(other.x,other.y-50,'#ffffff',8,'guard'); other.vx+=this.dir*3;
          } else {
            other.takeDamage(this.monster.attackDmg,this.dir);
            this.comboTimer=60; this.comboCount++;
          }
        }
      }
      this._prevAtk=atkKey;
      // 超必殺技: ガード同時押し + 必殺技ボタン
      const superKey = (this.playerNum===1) ? (keys['s']&&keys['g']) : (keys['ArrowDown']&&keys['l']);
      if (superKey && !this._prevSuper && this.superCooldown===0) {
        this.superBeamActive=true; this.superBeamProgress=0; this.superCooldown=360;
        const dx=other.x-this.x;
        if (Math.sign(dx)===this.dir) {
          setTimeout(()=>{ if(!other.guardTimer&&!other.hurtTimer){other.takeDamage(100,this.dir);addParticles(other.x,other.y-60,this.monster.color,40,'hit');addParticles(other.x,other.y-60,'#ffffff',20,'hit');} },700);
        }
        showSpecialText('超必殺！カメハメビーム！','#ffffff');
      }
      this._prevSuper=superKey;

      if (!superKey && spcKey && !this._prevSpc && this.specialCooldown===0) {
        this.specialActive=true; this.specialProgress=0; this.specialCooldown=180;
        const dx=other.x-this.x;
        if (Math.abs(dx)<420 && Math.sign(dx)===this.dir) {
          const dmg=this.monster.specialDmg;
          setTimeout(()=>{ if(!other.guardTimer&&!other.hurtTimer){other.takeDamage(dmg,this.dir);addParticles(other.x,other.y-50,this.monster.color,25,'hit');} },400);
        }
        showSpecialText(this.monster.specialName,this.monster.glowColor);
      }
      this._prevSpc=spcKey;
    }

    if (!inHurt && !inSpecial && this.attackTimer<10) {
      const lk=keys['a']||keys['ArrowLeft'], rk=keys['d']||keys['ArrowRight'];
      if (lk){this.vx=-this.monster.speed;if(this.state!=='attack')this.state='walk';}
      else if (rk){this.vx=this.monster.speed;if(this.state!=='attack')this.state='walk';}
      else {this.vx*=0.7;if(this.state==='walk')this.state='idle';}
    }

    const jumpKey=keys['w']||keys['ArrowUp'];
    if (!inHurt && !inSpecial && jumpKey&&!this._prevJump&&this.onGround){this.vy=-this.monster.jumpPower;this.onGround=false;this.state='jump';}
    this._prevJump=jumpKey;

    if (this.vy<0) this.onGround=false; // 上昇中は必ず空中扱い
    if (!this.onGround) this.vy+=1.1;
    this.x+=this.vx; this.y+=this.vy;
    if (this.y>=this.groundY){this.y=this.groundY;this.vy=0;this.onGround=true;if(this.state==='jump')this.state='idle';}
    if (this.y<120){this.y=120;this.vy=0;} // 天井
    this.x=Math.max(50,Math.min(W-50,this.x));
    if (this.attackTimer===0&&this.guardTimer===0&&this.state!=='walk'&&this.state!=='jump'&&this.state!=='hurt'&&!this.specialActive) {
      if (Math.abs(this.vx)<0.5) this.state='idle';
    }
  }

  _drawSuperBeam() {
    const p = this.superBeamProgress;
    const bx = this.x + this.dir*30;
    const by = this.y - 70;
    const beamLen = W * 1.2;

    ctx.save();
    if (p < 0.25) {
      // 溜め演出：エネルギー収束
      const chargeR = p/0.25;
      ctx.shadowColor='#ffffff'; ctx.shadowBlur=40;
      // 外周リング
      for (let i=0;i<3;i++) {
        ctx.strokeStyle=`rgba(255,255,255,${0.6-i*0.15})`;
        ctx.lineWidth=6-i*1.5;
        ctx.beginPath(); ctx.arc(bx,by,(1-chargeR)*80+chargeR*20+i*8,0,Math.PI*2); ctx.stroke();
      }
      // 収束パーティクル（静的に描画）
      for (let i=0;i<12;i++) {
        const ang=(i/12)*Math.PI*2+p*20;
        const dist=(1-chargeR)*120+10;
        const px=bx+Math.cos(ang)*dist, py=by+Math.sin(ang)*dist;
        ctx.fillStyle=`rgba(${200+Math.floor(55*chargeR)},${Math.floor(200*(1-chargeR))},255,${chargeR})`;
        ctx.beginPath(); ctx.arc(px,py,4+chargeR*4,0,Math.PI*2); ctx.fill();
      }
      // 中心の玉
      const grd=ctx.createRadialGradient(bx,by,0,bx,by,20*chargeR+5);
      grd.addColorStop(0,'#ffffff'); grd.addColorStop(0.5,this.monster.color); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(bx,by,20*chargeR+5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    } else {
      // ビーム発射
      const bp=(p-0.25)/0.75;
      const endX=bx+this.dir*beamLen;
      const beamH=Math.max(8, 60*(1-bp*0.7));

      // 画面フラッシュ（序盤）
      if (bp<0.1) {
        ctx.fillStyle=`rgba(255,255,255,${(0.1-bp)/0.1*0.4})`;
        ctx.fillRect(0,0,W,H);
      }

      // ビーム本体（複数層）
      const layers=[
        {w:beamH*1.8, color:`rgba(255,255,255,${0.3*(1-bp*0.5)})`},
        {w:beamH*1.2, color:this.monster.color+Math.floor((1-bp*0.3)*255).toString(16).padStart(2,'0')},
        {w:beamH*0.5, color:`rgba(255,255,255,${0.9*(1-bp*0.4)})`},
      ];
      for (const l of layers) {
        ctx.shadowColor='#ffffff'; ctx.shadowBlur=30;
        ctx.fillStyle=l.color;
        ctx.beginPath();
        ctx.moveTo(bx, by-l.w/2);
        ctx.lineTo(endX, by-l.w/4);
        ctx.lineTo(endX, by+l.w/4);
        ctx.lineTo(bx, by+l.w/2);
        ctx.closePath(); ctx.fill();
      }
      ctx.shadowBlur=0;

      // ビーム先端の爆発
      const tipX=bx+this.dir*beamLen*Math.min(1,(bp+0.1)*1.1);
      const expR=beamH*(0.8+Math.sin(bp*20)*0.2);
      const eg=ctx.createRadialGradient(tipX,by,0,tipX,by,expR);
      eg.addColorStop(0,'#ffffff'); eg.addColorStop(0.3,this.monster.color); eg.addColorStop(1,'transparent');
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(tipX,by,expR,0,Math.PI*2); ctx.fill();

      // 発射口の輝き
      const og=ctx.createRadialGradient(bx,by,0,bx,by,30);
      og.addColorStop(0,'#ffffff'); og.addColorStop(1,'transparent');
      ctx.fillStyle=og; ctx.beginPath(); ctx.arc(bx,by,30,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  takeDamage(dmg,fromDir) {
    if (this.hurtTimer>0) return; // 無敵時間中は追加ダメージなし
    this.hp=Math.max(0,this.hp-dmg);
    this.hurtTimer=30; this.vx=fromDir*5;
    if (this.onGround) this.vy=-4; // 空中では上方向ノックバックなし
    this.hitFlash=10;
    addParticles(this.x,this.y-50,this.monster.color,12,'hit');
    addParticles(this.x,this.y-50,'#ffffff',5,'hit');
  }

  draw() {
    if (this.hitFlash%4<2) {
      ctx.save();
      if (this.hitFlash>0) ctx.globalCompositeOperation='lighter';
      ctx.shadowColor=this.monster.glowColor;
      ctx.shadowBlur=this.state==='special'?30:12;
      this.monster.draw(ctx,this.x,this.y,this.dir,this.state,this.frame);
      ctx.restore();
    }
    if (this.specialActive) this.monster.drawSpecial(ctx,this.x,this.y,this.dir,this.specialProgress);
    if (this.superBeamActive) this._drawSuperBeam();
    if (this.comboCount>=2&&this.comboTimer>20) {
      ctx.fillStyle='#ffff00'; ctx.font='bold 20px Courier New'; ctx.textAlign='center';
      ctx.shadowColor='#ffaa00'; ctx.shadowBlur=10;
      ctx.fillText(`${this.comboCount} HIT!!`,this.x,this.y-125); ctx.shadowBlur=0;
    }
  }
}

// ===== ゲーム状態 =====
let gameState = 'MODE_SELECT'; // MODE_SELECT, SELECT, FIGHT, ROUNDOVER, GAMEOVER
let is1P = true;
let selectCursor = [0, 1];
let selectedMonsters = [-1,-1];
let selectStep = 0;
let fighter1, fighter2;
let cpu = null;
let roundTimer = 99*60, roundNum = 1;
let roundOverTimer = 0, roundOverMsg = '';
let gameOverMsg = '';
let flashTimer = 0;
let roundStartTimer = 90;

function initFight() {
  fighter1 = new Fighter(selectedMonsters[0], 200, 1, 1);
  fighter2 = new Fighter(selectedMonsters[1], 700, -1, 2);
  if (is1P) cpu = new CPU();
  roundTimer=99*60; particles.length=0; specialTexts.length=0;
  gameState='FIGHT'; flashTimer=30; roundStartTimer=90;
}

// ===== キー入力 =====
const keys = {};
document.addEventListener('keydown', e=>{
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;

  if (gameState==='MODE_SELECT') {
    if (e.key==='1'||(e.key==='f'&&!is1P)||(e.key==='Enter'&&is1P)) { is1P=true; gameState='SELECT'; selectStep=0; selectedMonsters=[-1,-1]; selectCursor=[0,1]; }
    if (e.key==='2'||(e.key==='k'&&is1P)||(e.key==='Enter'&&!is1P)) { is1P=false; gameState='SELECT'; selectStep=0; selectedMonsters=[-1,-1]; selectCursor=[0,1]; }
    if (e.key==='ArrowLeft'||e.key==='a') is1P=true;
    if (e.key==='ArrowRight'||e.key==='d') is1P=false;
    if (e.key===' '||e.key==='Enter') { gameState='SELECT'; selectStep=0; selectedMonsters=[-1,-1]; selectCursor=[0,1]; }
  }

  if (gameState==='SELECT') {
    if (selectStep===0) {
      if (e.key==='a'||e.key==='ArrowLeft') selectCursor[0]=(selectCursor[0]+MONSTERS.length-1)%MONSTERS.length;
      if (e.key==='d'||e.key==='ArrowRight') selectCursor[0]=(selectCursor[0]+1)%MONSTERS.length;
      if (e.key==='f'||e.key==='Enter') { selectedMonsters[0]=selectCursor[0]; if(is1P){selectedMonsters[1]=selectCursor[1];initFight();}else selectStep=1; }
    } else if (selectStep===1) {
      if (e.key==='ArrowLeft') selectCursor[1]=(selectCursor[1]+MONSTERS.length-1)%MONSTERS.length;
      if (e.key==='ArrowRight') selectCursor[1]=(selectCursor[1]+1)%MONSTERS.length;
      if (e.key==='k'||e.key==='Enter') { selectedMonsters[1]=selectCursor[1]; initFight(); }
    }
    if (e.key==='Escape') gameState='MODE_SELECT';
  }

  if (gameState==='GAMEOVER') {
    if (e.key==='r'||e.key==='R') { gameState='MODE_SELECT'; if(fighter1)fighter1.wins=0; if(fighter2)fighter2.wins=0; roundNum=1; }
  }
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ===== 背景 =====
const bgStars = Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*0.6,r:Math.random()*1.5+0.5,b:Math.random()}));
function drawBackground(shake) {
  const sx=shake?(Math.random()-0.5)*6:0, sy=shake?(Math.random()-0.5)*6:0;
  ctx.save(); ctx.translate(sx,sy);
  const sg=ctx.createLinearGradient(0,0,0,H*0.7);
  sg.addColorStop(0,'#050520'); sg.addColorStop(0.5,'#0a0a30'); sg.addColorStop(1,'#1a0a10');
  ctx.fillStyle=sg; ctx.fillRect(-10,-10,W+20,H*0.7+10);
  for (const s of bgStars) {
    const tw=0.4+0.6*Math.abs(Math.sin(Date.now()*0.002+s.b*10));
    ctx.globalAlpha=tw; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#ffffaa'; ctx.shadowColor='#ffffaa'; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.arc(750,80,40,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#0a0a30'; ctx.beginPath(); ctx.arc(763,72,36,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0d0d22'; ctx.beginPath(); ctx.moveTo(0,H*0.65);
  for (let i=0;i<=20;i++) ctx.lineTo((i/20)*W,H*0.65-Math.abs(Math.sin(i*0.7))*120-Math.abs(Math.sin(i*1.3))*80);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  const fg=ctx.createLinearGradient(0,H*0.7,0,H);
  fg.addColorStop(0,'#1a0a05'); fg.addColorStop(0.2,'#100805'); fg.addColorStop(1,'#050505');
  ctx.fillStyle=fg; ctx.fillRect(-10,H*0.7,W+20,H*0.3+10);
  ctx.strokeStyle='#ff440033'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,H*0.7); ctx.lineTo(W,H*0.7); ctx.stroke();
  ctx.restore();
}

// ===== HPバー =====
function drawHPBars() {
  const bw=300,bh=26,y=18;
  const drawBar=(f,x,align)=>{
    const ratio=f.hp/f.maxHp;
    const bc=ratio>0.5?'#44ff44':ratio>0.25?'#ffaa00':'#ff3300';
    ctx.fillStyle='#000000aa';
    ctx.beginPath(); ctx.roundRect(x-5,y-5,bw+10,bh+38,5); ctx.fill();
    ctx.font='bold 13px Courier New'; ctx.fillStyle=f.monster.color;
    ctx.textAlign=align; ctx.shadowColor=f.monster.glowColor; ctx.shadowBlur=8;
    const cpuTag = (is1P && f.playerNum===2) ? ' [CPU]' : '';
    ctx.fillText(`P${f.playerNum} ${f.monster.name}${cpuTag}`, align==='left'?x:x+bw, y-6);
    ctx.shadowBlur=0;
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(x,y+8,bw,bh,4); ctx.fill();
    if (ratio>0) {
      ctx.fillStyle=bc; ctx.shadowColor=bc; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.roundRect(align==='left'?x:x+bw-bw*ratio,y+8,bw*ratio,bh,4); ctx.fill(); ctx.shadowBlur=0;
    }
    ctx.fillStyle='#fff'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillText(`${Math.ceil(f.hp)}/${f.maxHp}`,x+bw/2,y+8+bh-7);
    for (let i=0;i<3;i++) {
      ctx.fillStyle=i<f.wins?'#ffcc00':'#333';
      const wx=x+(align==='left'?bw-45+i*18:45+(2-i)*18);
      ctx.beginPath(); ctx.arc(wx,y+8+bh+14,7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#555'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(wx,y+8+bh+14,7,0,Math.PI*2); ctx.stroke();
    }
  };
  drawBar(fighter1,28,'left'); drawBar(fighter2,W-28-300,'right');
  const sec=Math.ceil(roundTimer/60);
  ctx.fillStyle=sec<=10?'#ff3300':'#fff';
  ctx.font=`bold ${sec<=10?36:30}px Courier New`; ctx.textAlign='center';
  ctx.shadowColor=sec<=10?'#ff3300':'#ffffff44'; ctx.shadowBlur=sec<=10?15:5;
  ctx.fillText(sec<=0?'TIME':sec.toString().padStart(2,'0'),W/2,48); ctx.shadowBlur=0;
  ctx.fillStyle='#aaa'; ctx.font='13px Courier New'; ctx.textAlign='center';
  ctx.fillText(`ROUND ${roundNum}`,W/2,66);
}

// ===== モード選択画面 =====
function drawModeSelect() {
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#050520'); sg.addColorStop(1,'#1a0a10');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  // タイトル
  ctx.font='bold 54px Courier New'; ctx.textAlign='center';
  ctx.strokeStyle='#ff4400'; ctx.lineWidth=4; ctx.shadowColor='#ff4400'; ctx.shadowBlur=30;
  ctx.strokeText('MONSTER FIGHT',W/2,80); ctx.fillStyle='#fff'; ctx.fillText('MONSTER FIGHT',W/2,80);
  ctx.shadowBlur=0; ctx.font='18px Courier New'; ctx.fillStyle='#ff8800';
  ctx.fillText('モンスター格闘技',W/2,112);

  // モード選択カード
  const cards = [
    {label:'1P モード', sub:'CPU と対戦', key:'F / Enter', p:is1P, x:W/2-160},
    {label:'2P モード', sub:'友達と対戦', key:'K / Enter', p:!is1P, x:W/2+160},
  ];
  for (const c of cards) {
    const glow=c.p;
    ctx.fillStyle=glow?'#ffffff0a':'#0a0a20';
    ctx.strokeStyle=glow?'#ffcc00':'#333'; ctx.lineWidth=glow?3:1;
    ctx.shadowColor=glow?'#ffcc00':'transparent'; ctx.shadowBlur=glow?20:0;
    ctx.beginPath(); ctx.roundRect(c.x-120,160,240,180,12); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font='bold 28px Courier New'; ctx.fillStyle=glow?'#ffcc00':'#888'; ctx.textAlign='center';
    ctx.fillText(c.label,c.x,220);
    ctx.font='15px Courier New'; ctx.fillStyle=glow?'#fff':'#555';
    ctx.fillText(c.sub,c.x,255);
    ctx.font='13px Courier New'; ctx.fillStyle=glow?'#ffaa44':'#444';
    ctx.fillText(c.key,c.x,295);
    if (glow) {
      ctx.font='bold 24px Courier New'; ctx.fillStyle='#ffcc00';
      ctx.fillText('▶ SELECT ◀',c.x,328);
    }
  }
  ctx.font='14px Courier New'; ctx.fillStyle='#556'; ctx.textAlign='center';
  ctx.fillText('← → でモード選択  Enter/F/K で決定',W/2,H-30);
}

// ===== キャラ選択画面 =====
function drawSelectScreen() {
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#050520'); sg.addColorStop(1,'#1a0a10');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  ctx.font='bold 36px Courier New'; ctx.textAlign='center';
  ctx.strokeStyle='#ff4400'; ctx.lineWidth=3; ctx.shadowColor='#ff4400'; ctx.shadowBlur=20;
  ctx.strokeText('キャラクター選択',W/2,50); ctx.fillStyle='#fff'; ctx.fillText('キャラクター選択',W/2,50); ctx.shadowBlur=0;

  let stepMsg;
  if (is1P) stepMsg = 'A/D で選択  F/Enter で決定 （P2はCPUが担当）';
  else stepMsg = selectStep===0 ? 'P1: A/D で選択  F/Enter で決定' : 'P2: ←/→ で選択  K/Enter で決定';
  ctx.font='14px Courier New'; ctx.fillStyle='#aaa'; ctx.fillText(stepMsg,W/2,78);

  // カード（6キャラ：3列×2行）
  const cols=3, rows=2;
  const cw=200, ch=170, gap=16;
  const totalW=cols*(cw+gap)-gap;
  const startX=(W-totalW)/2+cw/2;
  const startY=110+ch/2;

  for (let i=0;i<MONSTERS.length;i++) {
    const m=MONSTERS[i];
    const col=i%cols, row=Math.floor(i/cols);
    const cx=startX+col*(cw+gap), cy=startY+row*(ch+gap);
    const isP1C=selectCursor[0]===i, isP2C=selectCursor[1]===i;
    const isP1Sel=selectedMonsters[0]===i;
    const glow=(isP1C&&selectStep===0)||(isP2C&&selectStep===1)||isP1Sel;

    ctx.fillStyle=glow?'#ffffff0a':'#0a0a20';
    ctx.strokeStyle=isP1Sel?'#ff4400':((isP2C&&selectStep===1)?'#4488ff':glow?m.color:'#333');
    ctx.lineWidth=glow?3:1; ctx.shadowColor=glow?m.glowColor:'transparent'; ctx.shadowBlur=glow?20:0;
    ctx.beginPath(); ctx.roundRect(cx-cw/2,cy-ch/2,cw,ch,8); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    ctx.save(); ctx.translate(cx,cy+10); ctx.scale(0.55,0.55);
    m.draw(ctx,0,0,1,glow?'walk':'idle',Date.now()*0.05);
    ctx.restore();

    ctx.font='bold 13px Courier New'; ctx.fillStyle=m.color; ctx.textAlign='center';
    ctx.shadowColor=m.glowColor; ctx.shadowBlur=8;
    ctx.fillText(m.name,cx,cy-ch/2+18); ctx.shadowBlur=0;
    ctx.fillStyle='#777'; ctx.font='10px Courier New';
    ctx.fillText(m.desc,cx,cy-ch/2+32);

    let badge='';
    if (isP1Sel) badge='P1';
    if (!is1P&&isP2C&&selectStep===1) badge+=(badge?'/':'')+'P2?';
    if (badge) {
      ctx.fillStyle=isP1Sel?'#ff4400':'#4488ff'; ctx.font='bold 12px Courier New';
      ctx.fillText(badge,cx,cy+ch/2-6);
    }
    if (isP1C&&selectStep===0) { ctx.fillStyle='#ff4400'; ctx.font='bold 22px Courier New'; ctx.fillText('▼',cx,cy-ch/2-8); }
    if (!is1P&&isP2C&&selectStep===1) { ctx.fillStyle='#4488ff'; ctx.font='bold 22px Courier New'; ctx.fillText('▼',cx,cy-ch/2-(selectStep===0?30:8)); }
  }

  ctx.font='12px Courier New'; ctx.fillStyle='#445'; ctx.textAlign='center';
  ctx.fillText('Esc でモード選択に戻る',W/2,H-12);
}

// ===== ラウンドオーバー =====
function drawRoundOverlay() {
  ctx.fillStyle='#00000066'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.font='bold 68px Courier New';
  ctx.globalAlpha=Math.min(1,roundOverTimer/30);
  ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=30;
  ctx.strokeText(roundOverMsg,W/2,H/2); ctx.fillStyle='#ffcc00'; ctx.fillText(roundOverMsg,W/2,H/2);
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

// ===== ゲームオーバー =====
function drawGameOver() {
  ctx.fillStyle='#000000cc'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.font='bold 56px Courier New';
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=40; ctx.strokeStyle='#000'; ctx.lineWidth=5;
  ctx.strokeText(gameOverMsg,W/2,H/2-50); ctx.fillStyle='#fff'; ctx.fillText(gameOverMsg,W/2,H/2-50);
  ctx.shadowBlur=0; ctx.font='20px Courier New'; ctx.fillStyle='#aaa';
  ctx.fillText('R キーでタイトルに戻る',W/2,H/2+10);
  const winner=fighter1.wins>=3?fighter1:fighter2;
  ctx.save(); ctx.translate(W/2,H*0.76); ctx.scale(1.1,1.1);
  winner.monster.draw(ctx,0,0,1,'idle',Date.now()*0.05);
  ctx.restore();
}

function drawFlash() {
  if (flashTimer>0){ctx.fillStyle=`rgba(255,255,255,${flashTimer/30*0.5})`;ctx.fillRect(0,0,W,H);flashTimer--;}
}

function drawFightStart() {
  if (roundStartTimer<=0) return false;
  roundStartTimer--;
  const t=roundStartTimer;
  if (t>60) {
    const sc=1+(t-60)/30*0.5, al=Math.min(1,(90-t)/10);
    ctx.save(); ctx.translate(W/2,H/2); ctx.scale(sc,sc); ctx.globalAlpha=al;
    ctx.font='bold 70px Courier New'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.shadowColor='#fff'; ctx.shadowBlur=30;
    ctx.strokeText(`ROUND ${roundNum}`,0,0); ctx.fillStyle='#fff'; ctx.fillText(`ROUND ${roundNum}`,0,0);
    ctx.shadowBlur=0; ctx.restore(); ctx.globalAlpha=1;
  } else if (t<30) {
    ctx.globalAlpha=t/30; ctx.font='bold 90px Courier New'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=8; ctx.shadowColor='#ff4400'; ctx.shadowBlur=40;
    ctx.strokeText('FIGHT!',W/2,H/2); ctx.fillStyle='#ffcc00'; ctx.fillText('FIGHT!',W/2,H/2);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  return t>0;
}

// ===== メインループ =====
function gameLoop() {
  ctx.clearRect(0,0,W,H);

  if (gameState==='MODE_SELECT') {
    drawModeSelect();
  } else if (gameState==='SELECT') {
    drawSelectScreen();
  } else if (gameState==='FIGHT'||gameState==='ROUNDOVER') {
    const shaking=fighter1&&fighter2&&(fighter1.specialActive||fighter2.specialActive);
    drawBackground(shaking);
    const paused=roundStartTimer>0||gameState==='ROUNDOVER';

    if (!paused) {
      roundTimer--;
      // CPU操作
      const p2Keys = (is1P && cpu) ? cpu.update(fighter2, fighter1) : keys;
      fighter1.update(keys, fighter2);
      fighter2.update(p2Keys, fighter1);
      updateParticles();

      // 勝敗判定
      if (fighter1.hp<=0||fighter2.hp<=0||roundTimer<=0) {
        let winner=null;
        if (fighter1.hp<=0&&fighter2.hp<=0) roundOverMsg='DRAW!';
        else if (fighter1.hp<=0) { winner=fighter2; roundOverMsg=`${fighter2.monster.name} WIN!`; }
        else if (fighter2.hp<=0) { winner=fighter1; roundOverMsg=`${fighter1.monster.name} WIN!`; }
        else {
          if (fighter1.hp>fighter2.hp){winner=fighter1;roundOverMsg=`${fighter1.monster.name} WIN!`;}
          else if (fighter2.hp>fighter1.hp){winner=fighter2;roundOverMsg=`${fighter2.monster.name} WIN!`;}
          else roundOverMsg='DRAW!';
        }
        if (winner) winner.wins++;
        gameState='ROUNDOVER'; roundOverTimer=0;
      }
    }

    drawParticles(); fighter1.draw(); fighter2.draw(); drawSpecialTexts(); drawHPBars();

    if (gameState==='ROUNDOVER') {
      roundOverTimer++;
      drawRoundOverlay();
      if (roundOverTimer>130) {
        const mw=3;
        if (fighter1.wins>=mw) { const pLabel=is1P?`P1 ${fighter1.monster.name}`:`P1 ${fighter1.monster.name}`; gameOverMsg=`${pLabel} 優勝！`; gameState='GAMEOVER'; }
        else if (fighter2.wins>=mw) { const pLabel=is1P?`CPU ${fighter2.monster.name}`:`P2 ${fighter2.monster.name}`; gameOverMsg=`${pLabel} 優勝！`; gameState='GAMEOVER'; }
        else {
          roundNum++;
          const w1=fighter1.wins,w2=fighter2.wins;
          initFight(); fighter1.wins=w1; fighter2.wins=w2;
        }
      }
    }
    drawFightStart(); drawFlash();

  } else if (gameState==='GAMEOVER') {
    drawBackground(false); drawParticles();
    if (fighter1) fighter1.draw(); if (fighter2) fighter2.draw();
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
